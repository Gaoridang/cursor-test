name: Deploy to TestFlight

# Windows/Mac 로컬 설치 없이 GitHub에서 iOS 빌드 → TestFlight 업로드
# 실제 iOS 빌드는 Expo 클라우드(EAS Build)에서 실행됩니다 (macOS runner 불필요).

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: EAS Build → TestFlight
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure App Store Connect API key
        run: |
          if [ -n "$ASC_API_KEY_BASE64" ]; then
            echo "$ASC_API_KEY_BASE64" | base64 -d > asc-api-key.p8
            chmod 600 asc-api-key.p8
            echo "ASC_API_KEY_PATH=asc-api-key.p8" >> "$GITHUB_ENV"
          fi
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}

      - name: Build iOS and submit to TestFlight
        run: eas build --platform ios --profile production --non-interactive --auto-submit
        env:
          EXPO_ASC_API_KEY_PATH: ${{ env.ASC_API_KEY_PATH }}
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
